<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760">
  <defs>
    <style>
      .title    { font: 700 28px 'Courier New', monospace; fill: #FFD060; }
      .subtitle { font: 400 14px 'Courier New', monospace; fill: #7A5200; }
      .box-title { font: 700 15px 'Courier New', monospace; fill: #E8A000; }
      .box-text  { font: 400 12px 'Courier New', monospace; fill: #B07800; }
      .small     { font: 400 11px 'Courier New', monospace; fill: #3D2900; }
      .lane-bg   { fill: #0E0E0B; stroke: #2A1C00; stroke-width: 1.5; }
      .box       { fill: #111108; stroke: #2A1C00; stroke-width: 1; }
      .accent    { fill: #1C1500; stroke: #B07800; stroke-width: 1; }
      .tool      { fill: #130D00; stroke: #FF6600; stroke-width: 1; }
      .arrow     { stroke: #7A5200; stroke-width: 1.5; fill: none; marker-end: url(#ah); }
    </style>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7A5200" />
    </marker>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1400" height="760" fill="#080806"/>
  <!-- scanlines -->
  <rect x="0" y="0" width="1400" height="760" fill="url(#scan)" opacity="0.04"/>

  <text x="50" y="50" class="title">LLVM IR Explorer</text>
  <text x="50" y="74" class="subtitle">source → IR → passes → asm → CFG</text>

  <!-- lane: Frontend -->
  <rect x="50" y="100" width="360" height="610" rx="2" class="lane-bg"/>
  <text x="70" y="128" class="box-title">FRONTEND (Leptos)</text>

  <rect x="72" y="145" width="316" height="110" rx="2" class="box"/>
  <text x="88" y="168" class="box-title">CodeEditor</text>
  <text x="88" y="188" class="box-text">paste C/C++, pick O0..O3</text>
  <text x="88" y="206" class="box-text">COMPILE → dispatch server action</text>

  <rect x="72" y="285" width="316" height="110" rx="2" class="box"/>
  <text x="88" y="308" class="box-title">Timeline</text>
  <text x="88" y="328" class="box-text">slider + pass list</text>
  <text x="88" y="346" class="box-text">current_pass_index → optimized IR</text>

  <rect x="72" y="425" width="316" height="250" rx="2" class="accent"/>
  <text x="88" y="450" class="box-title">OutputTabs</text>
  <text x="88" y="472" class="box-text">LLVM IR   (initial, O0)</text>
  <text x="88" y="491" class="box-text">Optimized IR  (per pass)</text>
  <text x="88" y="510" class="box-text">IR Diff   (LCS, max 500 lines)</text>
  <text x="88" y="529" class="box-text">Assembly</text>
  <text x="88" y="548" class="box-text">CFG (SVG)</text>
  <text x="88" y="567" class="box-text">↓ download .ll / .s</text>

  <!-- lane: Server -->
  <rect x="520" y="100" width="360" height="610" rx="2" class="lane-bg"/>
  <text x="540" y="128" class="box-title">SERVER (Axum + SSR)</text>

  <rect x="542" y="145" width="316" height="110" rx="2" class="box"/>
  <text x="558" y="168" class="box-title">CompileAndOptimize</text>
  <text x="558" y="188" class="box-text">POST /api/compile_and_optimize</text>
  <text x="558" y="206" class="box-text">validate ≤100k chars, create UUID tmpdir</text>

  <rect x="542" y="285" width="316" height="110" rx="2" class="box"/>
  <text x="558" y="308" class="box-title">Pipeline</text>
  <text x="558" y="328" class="box-text">shell out to clang++ / opt / dot</text>
  <text x="558" y="346" class="box-text">parse -print-after-all → passes[]</text>

  <rect x="542" y="425" width="316" height="250" rx="2" class="accent"/>
  <text x="558" y="450" class="box-title">CompileResult</text>
  <text x="558" y="472" class="box-text">initial_ir    string</text>
  <text x="558" y="491" class="box-text">passes[]      name + ir snapshot</text>
  <text x="558" y="510" class="box-text">assembly      string</text>
  <text x="558" y="529" class="box-text">cfgs[]        fn name + SVG</text>
  <text x="558" y="548" class="box-text">→ rm -rf tmpdir</text>

  <!-- lane: LLVM Tools -->
  <rect x="990" y="100" width="360" height="610" rx="2" class="lane-bg"/>
  <text x="1010" y="128" class="box-title">LLVM TOOLCHAIN</text>

  <rect x="1012" y="145" width="316" height="90" rx="2" class="tool"/>
  <text x="1028" y="168" class="box-title">clang++ -S -emit-llvm -O0</text>
  <text x="1028" y="188" class="box-text">→ output.ll  (baseline IR)</text>

  <rect x="1012" y="260" width="316" height="110" rx="2" class="tool"/>
  <text x="1028" y="283" class="box-title">opt -passes=default&lt;O*&gt;</text>
  <text x="1028" y="303" class="box-text">-print-after-all  -disable-output</text>
  <text x="1028" y="321" class="box-text">stderr → pass snapshots</text>

  <rect x="1012" y="395" width="316" height="90" rx="2" class="tool"/>
  <text x="1028" y="418" class="box-title">clang++ -S -O*</text>
  <text x="1028" y="438" class="box-text">→ output.s  (assembly)</text>

  <rect x="1012" y="510" width="316" height="90" rx="2" class="tool"/>
  <text x="1028" y="533" class="box-title">opt -passes=dot-cfg  +  dot -Tsvg</text>
  <text x="1028" y="553" class="box-text">→ .dot files → SVG per function</text>

  <!-- arrows -->
  <path d="M388 200 L542 200" class="arrow"/>
  <path d="M858 200 L1012 190" class="arrow"/>
  <path d="M1170 670 L858 550" class="arrow"/>
  <path d="M542 550 L388 550" class="arrow"/>
  <path d="M230 255 L230 285" class="arrow"/>
  <path d="M700 255 L700 285" class="arrow"/>

  <text x="52" y="748" class="small">src/app.rs  src/components.rs  src/server_functions.rs  src/highlight.rs  src/main.rs</text>
</svg>
